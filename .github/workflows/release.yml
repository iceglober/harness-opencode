name: release

on:
  release:
    types: [published]

# Only publish from the canonical repo — forked PRs never trigger this.
# Secrets are protected by an environment-protection rule requiring
# maintainer approval on the `npm-publish` environment.
jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm-publish
    # Extra guard: only run on the canonical repo, not forks.
    if: github.repository == 'iceglober/harness-opencode'
    permissions:
      contents: read
      packages: write  # required for GitHub Packages publish
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      # ── Publish to npm (primary registry, zero-friction for users) ──────────
      # Users install with: bun add @glrs-dev/harness-opencode
      # No auth required on the user side.
      - name: Setup Node for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # ── Publish to GitHub Packages (mirror, visible on repo page) ───────────
      # Users install with: bun add @glrs-dev/harness-opencode
      # but must first configure the registry:
      #   echo "@glorious:registry=https://npm.pkg.github.com" >> ~/.npmrc
      # This is why npm is the primary registry — GitHub Packages requires
      # per-user auth even for public packages.
      - name: Setup Node for GitHub Packages publish
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://npm.pkg.github.com'

      - name: Publish to GitHub Packages
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
